runtime:
  # Task-container backend: 'docker' (shell out to the docker CLI) or 'kubernetes' (launch task Pods).
  type: ${SMITHY_RUNTIME:docker}
  kubernetes:
    namespace: ${KUBERNETES_NAMESPACE:smithy}
    task-service-account: ${TASK_SERVICE_ACCOUNT:}
    image-pull-secret: ${TASK_IMAGE_PULL_SECRET:}
    task-cpu-request: ${TASK_CPU_REQUEST:250m}
    task-memory-request: ${TASK_MEMORY_REQUEST:512Mi}
    task-cpu-limit: ${TASK_CPU_LIMIT:}
    task-memory-limit: ${TASK_MEMORY_LIMIT:}
    cache-persistence: ${TASK_CACHE_PERSISTENCE:false}
    storage-class: ${TASK_STORAGE_CLASS:}

docker:
  command: ${DOCKER_COMMAND:docker}
  network: ${DOCKER_NETWORK:forgejo-net}
  task-image: ${TASK_IMAGE:claude-task-default:latest}
  cache-volumes: ${CACHE_VOLUMES:pnpm,npm}

claude:
  oauth-token: ${CLAUDE_CODE_OAUTH_TOKEN:}
  api-key: ${ANTHROPIC_API_KEY:}

vcs:
  provider: ${VCS_PROVIDER:forgejo}
  issue-provider: ${ISSUE_PROVIDER:}

  forgejo:
    url: ${FORGEJO_URL:http://forgejo:3000}
    external-url: ${FORGEJO_EXTERNAL_URL:http://localhost:3000}
    webhook-secret: ${WEBHOOK_SECRET:}
    smithy-token: ${SMITHY_FORGEJO_TOKEN:}
    architect-token: ${ARCHITECT_FORGEJO_TOKEN:}

  gitlab:
    url: ${GITLAB_URL:}
    external-url: ${GITLAB_EXTERNAL_URL:}
    webhook-secret: ${GITLAB_WEBHOOK_SECRET:}
    smithy-token: ${SMITHY_GITLAB_TOKEN:}
    architect-token: ${ARCHITECT_GITLAB_TOKEN:}
    token-type: ${GITLAB_TOKEN_TYPE:}

  github:
    url: ${GITHUB_URL:}
    external-url: ${GITHUB_EXTERNAL_URL:}
    webhook-secret: ${GITHUB_WEBHOOK_SECRET:}
    smithy-token: ${SMITHY_GITHUB_TOKEN:}
    architect-token: ${ARCHITECT_GITHUB_TOKEN:}

knowledgebase:
  enabled: ${KNOWLEDGEBASE_ENABLED:false}
  url: ${KNOWLEDGEBASE_URL:http://knowledgebase:8000/mcp}
  tool-name: ${KNOWLEDGEBASE_TOOL_NAME:searchKnowledge}

bots:
  smithy:
    user: ${SMITHY_BOT_USER:smithy}
    email: ${SMITHY_BOT_EMAIL:}
  architect:
    user: ${ARCHITECT_BOT_USER:architect}
    email: ${ARCHITECT_BOT_EMAIL:}
