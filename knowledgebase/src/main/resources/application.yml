spring:
  application:
    name: knowledgebase-mcp
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
      embedding:
        options:
          model: ${EMBEDDING_MODEL:nomic-embed-text}
      chat:
        options:
          model: ${CHAT_MODEL:llama3.2}
          temperature: 1
    mcp:
      server:
        enabled: true
        capabilities:
          tool: true
          resource: false
          prompt: false
          completion: false
        protocol: streamable

server:
  port: ${SERVER_PORT:8000}
  shutdown: immediate

logging:
  level:
    root: INFO
    dev.smithyai.knowledgebase: DEBUG
