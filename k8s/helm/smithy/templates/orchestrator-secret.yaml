{{- if not .Values.secrets.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "smithy.orchestrator.fullname" . }}-secret
  labels:
    {{- include "smithy.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
type: Opaque
stringData:
  {{- with .Values.secrets.claudeCodeOauthToken }}
  CLAUDE_CODE_OAUTH_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.smithyGitlabToken }}
  SMITHY_GITLAB_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.architectGitlabToken }}
  ARCHITECT_GITLAB_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.gitlabWebhookSecret }}
  GITLAB_WEBHOOK_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.smithyForgejoToken }}
  SMITHY_FORGEJO_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.architectForgejoToken }}
  ARCHITECT_FORGEJO_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.forgejoWebhookSecret }}
  WEBHOOK_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.smithyGithubToken }}
  SMITHY_GITHUB_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.architectGithubToken }}
  ARCHITECT_GITHUB_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.githubWebhookSecret }}
  GITHUB_WEBHOOK_SECRET: {{ . | quote }}
  {{- end }}
  {{- with .Values.secrets.adminPasswordHash }}
  ADMIN_PASSWORD_HASH: {{ . | quote }}
  {{- end }}
{{- end }}
