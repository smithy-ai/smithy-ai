apiVersion: v1
kind: Namespace
metadata:
  name: smithy
  labels:
    app.kubernetes.io/part-of: smithy
    # The orchestrator runs a privileged Docker-in-Docker (dind) sidecar to spawn
    # task containers. Pod Security Admission must allow privileged pods here.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: privileged
    pod-security.kubernetes.io/audit: privileged
