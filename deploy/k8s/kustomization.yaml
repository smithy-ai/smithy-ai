apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# All resources land in the smithy namespace.
namespace: smithy

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - rbac.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml

labels:
  - pairs:
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: false
