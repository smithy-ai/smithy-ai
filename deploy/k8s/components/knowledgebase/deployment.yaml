apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledgebase
  labels:
    app.kubernetes.io/name: knowledgebase
    app.kubernetes.io/part-of: smithy
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: knowledgebase
  template:
    metadata:
      labels:
        app.kubernetes.io/name: knowledgebase
        app.kubernetes.io/part-of: smithy
    spec:
      containers:
        - name: knowledgebase
          image: ghcr.io/smithy-ai/knowledgebase:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: knowledgebase-secrets
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: vectorstore
              mountPath: /app/vectorstore
            - name: config
              mountPath: /config/knowledgebase.yml
              subPath: knowledgebase.yml
              readOnly: true
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: vectorstore
          persistentVolumeClaim:
            claimName: knowledgebase-vectorstore
        - name: config
          configMap:
            name: knowledgebase-config
