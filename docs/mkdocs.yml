site_name: Smithy AI
site_description: Documentation for Smithy, AI assisted software development orchestrator
repo_url: https://github.com/smithy-ai/smithy-ai
repo_name: smithy-ai
docs_dir: src

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: green
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Setup:
    - Local Demo: setup/demo.md
    - GitLab: setup/gitlab.md
    - Forgejo: setup/forgejo.md
  - Usage:
    - Workflow: usage.md
    - Configuration: configuration.md
  - Advanced:
    - Custom Task Images: advanced/custom-task-images.md

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
