services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - forgejo-data:/data
      - ./config/forgejo-extra-links.tmpl:/data/gitea/templates/custom/extra_links.tmpl:ro
    environment:
      - FORGEJO__webhook__ALLOWED_HOST_LIST=orchestrator,knowledgebase
      - FORGEJO__actions__ENABLED=true
      - FORGEJO__ui__DEFAULT_SHOW_FULL_NAME=true
    networks:
      - forgejo-net

  orchestrator:
    image: ghcr.io/smithy-ai/orchestrator:${IMAGE_TAG:-dev}
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - FORGEJO_URL=${FORGEJO_URL:-http://forgejo:3000}
      - FORGEJO_EXTERNAL_URL=${FORGEJO_EXTERNAL_URL:-http://localhost:3000}
      - SMITHY_FORGEJO_TOKEN=${SMITHY_FORGEJO_TOKEN}
      - ARCHITECT_FORGEJO_TOKEN=${ARCHITECT_FORGEJO_TOKEN:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - DOCKER_NETWORK=${DOCKER_NETWORK:-forgejo-net}
      - TASK_IMAGE=${TASK_IMAGE:-ghcr.io/smithy-ai/claude-task-default:dev}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - KNOWLEDGEBASE_ENABLED=${KNOWLEDGEBASE_ENABLED:-false}
      - KNOWLEDGEBASE_URL=${KNOWLEDGEBASE_URL:-http://knowledgebase:8000/mcp}
    networks:
      - forgejo-net
    depends_on:
      - forgejo

  # Uncomment to enable knowledgebase MCP server (requires OPENAI_API_KEY and
  # a configured repositories list in config/knowledgebase.yml)
  # knowledgebase:
  #   image: ghcr.io/smithy-ai/knowledgebase:${IMAGE_TAG:-dev}
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     - OPENAI_API_KEY=${OPENAI_API_KEY:-}
  #     - VCS_URL=${FORGEJO_URL:-http://forgejo:3000}
  #     - VCS_TOKEN=${SMITHY_FORGEJO_TOKEN:-}
  #     - WEBHOOK_SECRET=${WEBHOOK_SECRET}
  #   volumes:
  #     - kb-vectorstore:/app/vectorstore
  #     - ./config/knowledgebase.yml:/config/knowledgebase.yml:ro
  #   networks:
  #     - forgejo-net

  runner:
    image: data.forgejo.org/forgejo/runner:12.7.1
    user: "0"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - runner-data:/data
      - ./config/runner-config.yml:/config/runner-config.yml:ro
    environment:
      - FORGEJO_URL=http://forgejo:3000
      - RUNNER_TOKEN=${RUNNER_TOKEN}
    entrypoint:
      - sh
      - -c
      - |
        forgejo-runner register \
          --instance "$FORGEJO_URL" \
          --token "$RUNNER_TOKEN" \
          --name runner \
          --labels "" \
          --no-interactive; \
        forgejo-runner daemon --config /config/runner-config.yml
    networks:
      - forgejo-net
    depends_on:
      - forgejo

volumes:
  forgejo-data:
  cache-pnpm:
  cache-maven:
  cache-npm:
  cache-gradle:
  runner-data:
  kb-vectorstore:

networks:
  forgejo-net:
    name: forgejo-net
