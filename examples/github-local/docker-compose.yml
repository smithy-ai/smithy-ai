services:
  orchestrator:
    image: ghcr.io/smithy-ai/orchestrator:${IMAGE_TAG:-dev}
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - VCS_PROVIDER=github
      - SMITHY_GITHUB_TOKEN=${SMITHY_GITHUB_TOKEN}
      - ARCHITECT_GITHUB_TOKEN=${ARCHITECT_GITHUB_TOKEN}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - DOCKER_NETWORK=${DOCKER_NETWORK:-smithy-net}
      - TASK_IMAGE=${TASK_IMAGE:-ghcr.io/smithy-ai/claude-task-default:dev}
      - CACHE_VOLUMES=${CACHE_VOLUMES:-pnpm,npm}
      - SMITHY_BOT_USER=${SMITHY_BOT_USER:-smithy-bot}
      - ARCHITECT_BOT_USER=${ARCHITECT_BOT_USER:-architect-bot}
      - SMITHY_BOT_EMAIL=${SMITHY_BOT_EMAIL:-}
      - ARCHITECT_BOT_EMAIL=${ARCHITECT_BOT_EMAIL:-}
      - DOCKER_API_VERSION=1.41
      - KNOWLEDGEBASE_ENABLED=${KNOWLEDGEBASE_ENABLED:-false}
      - KNOWLEDGEBASE_URL=${KNOWLEDGEBASE_URL:-http://knowledgebase:8000/mcp}
    networks:
      - smithy-net

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles:
      - knowledgebase
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - smithy-net
    entrypoint: ["/bin/sh", "-c", "ollama serve & pid=$$!; sleep 5; ollama pull ${EMBEDDING_MODEL:-nomic-embed-text}; ollama pull ${CHAT_MODEL:-llama3.2}; wait $$pid"]

  knowledgebase:
    image: ghcr.io/smithy-ai/knowledgebase:${IMAGE_TAG:-dev}
    restart: unless-stopped
    profiles:
      - knowledgebase
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - CHAT_MODEL=${CHAT_MODEL:-llama3.2}
      - VCS_URL=${KB_VCS_URL:-https://github.com}
      - VCS_TOKEN=${KB_VCS_TOKEN:-${SMITHY_GITHUB_TOKEN}}
      - WEBHOOK_SECRET=${KB_WEBHOOK_SECRET:-}
    volumes:
      - kb-vectorstore:/app/vectorstore
      - ./config/knowledgebase.yml:/config/knowledgebase.yml:ro
    networks:
      - smithy-net

volumes:
  ollama-models:
  kb-vectorstore:

networks:
  smithy-net:
    name: smithy-net
